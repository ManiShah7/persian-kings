<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0c0a08" />
  <!-- 8-point star (two overlaid squares), a classic Persian motif -->
  <g fill="none" stroke="#d4a935" stroke-width="2" stroke-linejoin="round">
    <rect x="8.5" y="8.5" width="15" height="15" />
    <rect x="8.5" y="8.5" width="15" height="15" transform="rotate(45 16 16)" />
  </g>
  <circle cx="16" cy="16" r="2.4" fill="#d4a935" />
</svg>
